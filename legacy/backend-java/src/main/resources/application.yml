spring:
  application:
    name: saas-pricing-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/saas_pricing}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jackson:
    time-zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt-secret: ${JWT_SECRET:change-me-in-dev}
    jwt-expire-seconds: ${JWT_EXPIRE_SECONDS:7200}
  source-system:
    default: xindian_jiangsu

